  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

-display: swap;\n  src: url(\"b178b5ed-eb09-4a02-9382-7f312fc72707\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Schibsted Grotesk';\n  font-style: normal;\n  font-weight: 600;\n  font-display: swap;\n  src: url(\"60a911aa-8a2d-48fe-b6d2-404c2036b0b8\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Schibsted Grotesk';\n  font-style: normal;\n  font-weight: 600;\n  font-display: swap;\n  src: url(\"b178b5ed-eb09-4a02-9382-7f312fc72707\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Schibsted Grotesk';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"60a911aa-8a2d-48fe-b6d2-404c2036b0b8\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Schibsted Grotesk';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"b178b5ed-eb09-4a02-9382-7f312fc72707\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>/* ============================================================\n   Rippl — refreshed landing system\n   Dark, premium, glassy. Brand blue → cyan ripple gradient.\n   ============================================================ */\n\n:root {\n  /* surfaces */\n  --bg: #07070A;\n  --bg-2: #0B0B10;\n  --surface: #0F0F16;\n  --surface-2: #15151E;\n  --surface-hi: #1C1C27;\n\n  /* lines */\n  --line: rgba(255, 255, 255, 0.07);\n  --line-2: rgba(255, 255, 255, 0.12);\n  --line-hi: rgba(255, 255, 255, 0.18);\n\n  /* text */\n  --text: #F4F5F7;\n  --muted: #9DA0AB;\n  --muted-2: #696C77;\n\n  /* brand */\n  --blue: #3B82F6;\n  --blue-hi: #6AA1FF;\n  --cyan: #36D8E6;\n  --grad: linear-gradient(110deg, #3B82F6 0%, #36D8E6 100%);\n  --grad-soft: linear-gradient(110deg, rgba(59,130,246,.16), rgba(54,216,230,.16));\n\n  /* platform colors */\n  --tiktok: #FF2D55;\n  --ig: #E0457B;\n  --yt: #FF4438;\n  --snap: #FFCE0A;\n\n  /* misc */\n  --radius: 16px;\n  --radius-lg: 22px;\n  --radius-sm: 11px;\n  --maxw: 1180px;\n  --ease: cubic-bezier(.2, .7, .2, 1);\n\n  --font-sans: \"Schibsted Grotesk\", system-ui, sans-serif;\n  --font-mono: \"JetBrains Mono\", ui-monospace, monospace;\n  --font-display: \"Schibsted Grotesk\", system-ui, sans-serif;\n  --display-tracking: -0.02em;\n  --display-weight: 600;\n}\n\n* { box-sizing: border-box; margin: 0; padding: 0; }\n\n[hidden] { display: none !important; }\n\nhtml { scroll-behavior: smooth; scroll-padding-top: 90px; }\n\nbody {\n  font-family: var(--font-sans);\n  background: var(--bg);\n  color: var(--text);\n  line-height: 1.5;\n  -webkit-font-smoothing: antialiased;\n  text-rendering: optimizeLegibility;\n  overflow-x: hidden;\n}\n\na { color: inherit; text-decoration: none; }\nbutton { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }\nimg, svg { display: block; }\n\n::selection { background: rgba(59, 130, 246, .35); color: #fff; }\n\n/* ---------- layout helpers ---------- */\n.wrap { width: 100%; max-width: var(--maxw); margin: 0 auto; padding: 0 28px; }\n.section { padding: clamp(72px, 11vw, 140px) 0; position: relative; }\n.eyebrow {\n  font-family: var(--font-mono);\n  font-size: 12px;\n  letter-spacing: .18em;\n  text-transform: uppercase;\n  color: var(--cyan);\n  display: inline-flex;\n  align-items: center;\n  gap: 9px;\n  margin-bottom: 22px;\n}\n.eyebrow::before {\n  content: \"\";\n  width: 22px; height: 1px;\n  background: linear-gradient(90deg, var(--cyan), transparent);\n}\n.section-head { max-width: 680px; margin-bottom: 56px; }\nh1, h2, h3 { font-family: var(--font-display); letter-spacing: var(--display-tracking); line-height: 1.05; font-weight: var(--display-weight); text-wrap: balance; }\nh2 { font-size: clamp(32px, 4.4vw, 52px); }\nh3 { font-size: 20px; font-weight: 600; letter-spacing: -0.01em; }\n.lede { color: var(--muted); font-size: clamp(16px, 1.5vw, 19px); margin-top: 20px; max-width: 56ch; text-wrap: pretty; }\n\n/* ---------- buttons ---------- */\n.btn {\n  display: inline-flex; align-items: center; gap: 9px;\n  padding: 13px 22px; border-radius: 999px;\n  font-size: 15px; font-weight: 600;\n  transition: transform .25s var(--ease), box-shadow .25s var(--ease), background .25s, border-color .25s;\n  white-space: nowrap;\n}\n.btn svg { width: 16px; height: 16px; }\n.btn-primary {\n  background: var(--grad); color: #04121f;\n  box-shadow: 0 8px 30px -8px rgba(54, 216, 230, .55), inset 0 1px 0 rgba(255,255,255,.4);\n}\n.btn-primary:hover { transform: translateY(-2px); box-shadow: 0 14px 40px -8px rgba(54, 216, 230, .7), inset 0 1px 0 rgba(255,255,255,.5); }\n.btn-ghost {\n  background: rgba(255, 255, 255, .04); color: var(--text);\n  border: 1px solid var(--line-2); backdrop-filter: blur(8px);\n}\n.btn-ghost:hover { background: rgba(255, 255, 255, .08); border-color: var(--line-hi); transform: translateY(-2px); }\n.btn-sm { padding: 9px 16px; font-size: 13.5px; }\n.btn-lg { padding: 16px 30px; font-size: 16px; }\n.btn .arr { transition: transform .25s var(--ease); }\n.btn:hover .arr { transform: translateX(3px); }\n\n/* ============================================================\n   NAV\n   ============================================================ */\n.topbar {\n  text-align: center; font-size: 13px; padding: 9px 16px;\n  background: var(--grad); color: #04121f; font-weight: 600;\n  display: flex; align-items: center; justify-content: center; gap: 14px;\n  position: relative; z-index: 60;\n}\n.topbar a { display: inline-flex; align-items: center; gap: 5px; text-decoration: underline; text-underline-offset: 3px; }\n.topbar .dot { width: 6px; height: 6px; border-radius: 50%; background: #04121f; opacity: .5; }\n\nnav.bar {\n  position: sticky; top: 0; z-index: 50;\n  backdrop-filter: blur(16px) saturate(160%);\n  background: rgba(7, 7, 10, .55);\n  border-bottom: 1px solid transparent;\n  transition: background .3s, border-color .3s;\n}\nnav.bar.scrolled { background: rgba(7, 7, 10, .82); border-bottom-color: var(--line); }\n.nav-inner { display: flex; align-items: center; justify-content: space-between; height: 66px; }\n.logo { display: flex; align-items: center; gap: 9px; font-weight: 700; font-size: 19px; letter-spacing: -0.03em; }\n.logo .mark { width: 26px; height: 26px; position: relative; }\n.nav-links { display: flex; gap: 4px; }\n.nav-links a {\n  font-size: 14.5px; color: var(--muted); padding: 7px 13px; border-radius: 9px;\n  transition: color .2s, background .2s; position: relative;\n}\n.nav-links a:hover { color: var(--text); background: rgba(255,255,255,.04); }\n.nav-links a.active { color: var(--text); }\n.nav-links a.active::after {\n  content: \"\"; position: absolute; left: 13px; right: 13px; bottom: 1px; height: 2px;\n  background: var(--grad); border-radius: 2px;\n}\n.nav-actions { display: flex; align-items: center; gap: 8px; }\n.nav-actions .signin { font-size: 14.5px; color: var(--muted); padding: 8px 12px; transition: color .2s; }\n.nav-actions .signin:hover { color: var(--text); }\n.menu-toggle { display: none; }\n\n@media (max-width: 860px) {\n  .nav-links, .nav-actions .signin { display: none; }\n}\n\n/* ============================================================\n   HERO\n   ============================================================ */\n.hero { position: relative; padding: clamp(70px, 11vw, 130px) 0 clamp(40px, 6vw, 70px); text-align: center; overflow: hidden; }\n.hero-glow {\n  position: absolute; inset: -20% -10% auto -10%; height: 700px; z-index: 0; pointer-events: none;\n  background:\n    radial-gradient(420px 360px at 38% 18%, rgba(59,130,246,.22), transparent 70%),\n    radial-gradient(420px 360px at 64% 12%, rgba(54,216,230,.16), transparent 70%);\n  filter: blur(8px);\n}\n.ripple-field { position: absolute; top: -120px; left: 50%; transform: translateX(-50%); width: 900px; height: 900px; z-index: 0; pointer-events: none; opacity: .5; }\n.ripple-field span {\n  position: absolute; inset: 0; margin: auto; width: 180px; height: 180px; border-radius: 50%;\n  border: 1px solid rgba(120, 190, 255, .25); animation: ripple 7s var(--ease) infinite;\n}\n.ripple-field span:nth-child(2) { animation-delay: 1.75s; }\n.ripple-field span:nth-child(3) { animation-delay: 3.5s; }\n.ripple-field span:nth-child(4) { animation-delay: 5.25s; }\n@keyframes ripple {\n  0% { transform: scale(.3); opacity: 0; }\n  15% { opacity: .9; }\n  100% { transform: scale(4.6); opacity: 0; }\n}\n.hero .wrap { position: relative; z-index: 2; }\n.hero-tag {\n  display: inline-flex; align-items: center; gap: 9px; padding: 6px 14px 6px 6px; border-radius: 999px;\n  background: rgba(255,255,255,.04); border: 1px solid var(--line-2); font-size: 13px; color: var(--muted);\n  margin-bottom: 30px; backdrop-filter: blur(8px);\n}\n.hero-tag b { background: var(--grad); color: #04121f; font-weight: 600; padding: 3px 10px; border-radius: 999px; font-size: 11.5px; letter-spacing: .02em; }\n.hero h1 {\n  font-size: clamp(44px, 7.6vw, 92px); font-weight: var(--display-weight); letter-spacing: var(--display-tracking); line-height: .98;\n}\n.hero h1 .rippl { background: var(--grad); -webkit-background-clip: text; background-clip: text; color: transparent; }\n.hero p.sub { margin: 26px auto 0; max-width: 60ch; color: var(--muted); font-size: clamp(17px, 1.8vw, 21px); text-wrap: pretty; }\n.hero-cta { display: flex; gap: 13px; justify-content: center; margin-top: 38px; flex-wrap: wrap; }\n.hero-proof { margin-top: 30px; display: flex; align-items: center; justify-content: center; gap: 14px; color: var(--muted-2); font-size: 13.5px; }\n.avatars { display: flex; }\n.avatars span { width: 28px; height: 28px; border-radius: 50%; border: 2px solid var(--bg); margin-left: -8px; background: var(--surface-hi); }\n.avatars span:first-child { margin-left: 0; }\n\n/* ============================================================\n   HERO DEMO (interactive publish flow)\n   ============================================================ */\n.demo-card {\n  position: relative; z-index: 2; margin: 60px auto 0; max-width: 940px;\n  border-radius: var(--radius-lg); border: 1px solid var(--line-2);\n  background: linear-gradient(180deg, rgba(22,22,30,.9), rgba(12,12,17,.9));\n  backdrop-filter: blur(20px);\n  box-shadow: 0 50px 120px -40px rgba(0,0,0,.9), inset 0 1px 0 rgba(255,255,255,.06);\n  overflow: hidden;\n}\n.demo-top { display: flex; align-items: center; gap: 8px; padding: 15px 20px; border-bottom: 1px solid var(--line); }\n.demo-top .demo-brand { display: flex; align-items: center; gap: 10px; font-weight: 600; font-size: 14px; letter-spacing: -0.01em; }\n.demo-top .db-mark { width: 20px; height: 20px; display: block; }\n.demo-top .db-sep { color: var(--muted-2); font-weight: 400; }\n.demo-top .db-title { color: var(--muted); font-weight: 500; }\n.demo-top .live { margin-left: auto; font-size: 11.5px; color: var(--cyan); display: flex; align-items: center; gap: 7px; font-weight: 500; }\n.demo-top .live i { width: 7px; height: 7px; border-radius: 50%; background: var(--cyan); box-shadow: 0 0 10px var(--cyan); animation: pulse 1.6s infinite; }\n@keyframes pulse { 50% { opacity: .35; } }\n\n.demo-body { display: grid; grid-template-columns: 1fr 1fr; min-height: 320px; }\n.demo-left { padding: 30px; border-right: 1px solid var(--line); display: flex; flex-direction: column; }\n.demo-steps { display: flex; gap: 6px; margin-bottom: 24px; }\n.demo-steps button {\n  flex: 1; font-family: var(--font-mono); font-size: 11px; letter-spacing: .04em; color: var(--muted-2);\n  padding: 9px 4px; border-radius: 9px; border: 1px solid var(--line); transition: all .25s; text-align: center;\n}\n.demo-steps button.on { color: var(--text); border-color: var(--line-hi); background: rgba(255,255,255,.04); }\n.demo-steps button.done { color: var(--cyan); border-color: rgba(54,216,230,.4); }\n\n.dropzone {\n  flex: 1; border: 1.5px dashed var(--line-2); border-radius: var(--radius);\n  display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 14px;\n  text-align: center; padding: 24px; transition: all .3s; cursor: pointer; color: var(--muted);\n}\n.dropzone:hover { border-color: var(--cyan); background: rgba(54,216,230,.04); }\n.dropzone .ico { width: 52px; height: 52px; border-radius: 14px; background: var(--grad-soft); border: 1px solid var(--line-2); display: grid; place-items: center; }\n.dropzone .ico svg { width: 24px; height: 24px; stroke: var(--cyan); }\n.dropzone b { color: var(--text); font-size: 15px; }\n.dropzone small { font-family: var(--font-mono); font-size: 11px; color: var(--muted-2); }\n\n.platform-pick { display: flex; flex-direction: column; gap: 10px; flex: 1; }\n.platform-pick .pp-row {\n  display: flex; align-items: center; gap: 12px; padding: 12px 14px; border-radius: 12px;\n  border: 1px solid var(--line); background: var(--surface); transition: all .2s; cursor: pointer;\n}\n.platform-pick .pp-row:hover { border-color: var(--line-hi); }\n.platform-pick .pp-row.sel { border-color: var(--line-hi); background: var(--surface-2); }\n. ound: var(--grad-soft); color: var(--cyan); border: 1px solid rgba(54,216,230,.25); letter-spacing: .04em; }\n.cl-body p { color: var(--muted); font-size: 14.5px; }\n\n@media (max-width: 600px) { .cl-item { grid-template-columns: 1fr; gap: 8px; } }\n\n/* ============================================================\n   FOOTER\n   ============================================================ */\nfooter { border-top: 1px solid var(--line); padding: 70px 0 40px; }\n.foot-grid { display: flex; justify-content: space-between; align-items: center; gap: 30px; flex-wrap: wrap; }\n.foot-brand p { color: var(--muted); font-size: 14px; margin: 16px 0 22px; max-width: 34ch; }\n.foot-social { display: flex; gap: 10px; }\n.foot-social a { width: 36px; height: 36px; border-radius: 9px; border: 1px solid var(--line); display: grid; place-items: center; transition: all .25s; }\n.foot-social a:hover { border-color: var(--line-hi); background: var(--surface); transform: translateY(-2px); }\n.foot-social svg { width: 16px; height: 16px; stroke: var(--muted); }\n.foot-col h5 { font-family: var(--font-mono); font-size: 11px; letter-spacing: .1em; text-transform: uppercase; color: var(--muted-2); margin-bottom: 16px; }\n.foot-col a { display: block; color: var(--muted); font-size: 14px; padding: 5px 0; transition: color .2s; }\n.foot-col a:hover { color: var(--text); }\n.foot-bottom { display: flex; justify-content: space-between; align-items: center; margin-top: 56px; padding-top: 28px; border-top: 1px solid var(--line); color: var(--muted-2); font-size: 13px; flex-wrap: wrap; gap: 12px; }\n.foot-bottom .made { font-family: var(--font-mono); }\n\n@media (max-width: 820px) { .foot-grid { flex-direction: column; align-items: flex-start; } }\n\n/* ============================================================\n   SCROLL REVEAL\n   ============================================================ */\n.reveal { opacity: 0; transform: translateY(24px); transition: opacity .7s var(--ease), transform .7s var(--ease); }\n.reveal.in { opacity: 1; transform: none; }\n.reveal.d1 { transition-delay: .07s; }\n.reveal.d2 { transition-delay: .14s; }\n.reveal.d3 { transition-delay: .21s; }\n\n@media (prefers-reduced-motion: reduce) {\n  * { animation: none !important; scroll-behavior: auto !important; }\n  .reveal { opacity: 1; transform: none; transition: none; }\n  .ripple-field { display: none; }\n}\n<\u002Fstyle>\n<style>/* ============================================================\n   Rippl — Tweakable aesthetic directions\n   Driven by data attributes on <html>: data-display, data-hero, data-intro\n   ============================================================ */\n\n/* ---------- HEADLINE FONT ---------- */\nhtml[data-display=\"bricolage\"] {\n  --font-display: \"Bricolage Grotesque\", system-ui, sans-serif;\n  --display-tracking: -0.025em;\n  --display-weight: 700;\n}\nhtml[data-display=\"instrument\"] {\n  --font-display: \"Instrument Serif\", Georgia, serif;\n  --display-tracking: -0.005em;\n  --display-weight: 400;\n}\n/* Instrument Serif is light by nature — give it room and scale */\nhtml[data-display=\"instrument\"] h1,\nhtml[data-display=\"instrument\"] h2,\nhtml[data-display=\"instrument\"] h3 { font-weight: 400; }\nhtml[data-display=\"instrument\"] .hero h1 { font-size: clamp(52px, 9vw, 108px); line-height: .94; }\nhtml[data-display=\"instrument\"] h2 { font-size: clamp(38px, 5.2vw, 62px); }\nhtml[data-display=\"instrument\"] .rippl { font-style: italic; }\n\n/* Bricolage hero a touch tighter */\nhtml[data-display=\"bricolage\"] .hero h1 { letter-spacing: -0.04em; }\n\n/* ============================================================\n   HERO ATMOSPHERE\n   The .hero-atmos layer holds 3 blurred orbs (<i>) for the aurora.\n   ============================================================ */\n.hero-atmos { position: absolute; inset: 0; z-index: 0; pointer-events: none; overflow: hidden; opacity: 0; transition: opacity .6s ease; }\n.hero-atmos i { position: absolute; border-radius: 50%; filter: blur(70px); opacity: .55; }\n\n/* default (minimal): atmos hidden, rely on existing .hero-glow */\nhtml[data-hero=\"minimal\"] .hero-atmos { opacity: 0; }\n\n/* ---------- AURORA: drifting caustic color mesh ---------- */\nhtml[data-hero=\"aurora\"] .hero-atmos { opacity: 1; }\nhtml[data-hero=\"aurora\"] .hero-glow { opacity: .35; }\nhtml[data-hero=\"aurora\"] .hero-atmos i:nth-child(1) {\n  width: 560px; height: 560px; top: -180px; left: 8%;\n  background: radial-gradient(circle, #2563EB, transparent 65%);\n  animation: drift1 18s ease-in-out infinite;\n}\nhtml[data-hero=\"aurora\"] .hero-atmos i:nth-child(2) {\n  width: 520px; height: 520px; top: -120px; right: 6%;\n  background: radial-gradient(circle, #36D8E6, transparent 65%);\n  animation: drift2 22s ease-in-out infinite;\n}\nhtml[data-hero=\"aurora\"] .hero-atmos i:nth-child(3) {\n  width: 460px; height: 460px; top: 120px; left: 38%;\n  background: radial-gradient(circle, #1E40AF, transparent 70%);\n  animation: drift3 26s ease-in-out infinite;\n}\n@keyframes drift1 { 0%,100% { transform: translate(0,0) scale(1); } 50% { transform: translate(60px,40px) scale(1.15); } }\n@keyframes drift2 { 0%,100% { transform: translate(0,0) scale(1); } 50% { transform: translate(-50px,50px) scale(1.1); } }\n@keyframes drift3 { 0%,100% { transform: translate(0,0) scale(1); } 50% { transform: translate(30px,-40px) scale(1.2); } }\n\n/* faint caustic line grid on top of aurora for \"water surface\" feel */\nhtml[data-hero=\"aurora\"] .hero::before {\n  content: \"\"; position: absolute; inset: 0; z-index: 0; pointer-events: none;\n  background:\n    repeating-linear-gradient(115deg, transparent 0 38px, rgba(120,200,255,.04) 38px 39px),\n    repeating-linear-gradient(65deg, transparent 0 38px, rgba(120,200,255,.03) 38px 39px);\n  mask-image: radial-gradient(120% 80% at 50% 0%, #000, transparent 75%);\n}\n\n/* ---------- GRID: technical blueprint ---------- */\nhtml[data-hero=\"grid\"] .hero-atmos { opacity: 1; }\nhtml[data-hero=\"grid\"] .hero-atmos i:nth-child(1) {\n  width: 620px; height: 620px; top: -220px; left: 50%; transform: translateX(-50%);\n  background: radial-gradient(circle, rgba(59,130,246,.5), transparent 60%); filter: blur(80px);\n}\nhtml[data-hero=\"grid\"] .hero-atmos i:nth-child(2),\nhtml[data-hero=\"grid\"] .hero-atmos i:nth-child(3) { display: none; }\nhtml[data-hero=\"grid\"] .hero::before {\n  content: \"\"; position: absolute; inset: 0; z-index: 0; pointer-events: none;\n  background-image:\n    linear-gradient(rgba(255,255,255,.045) 1px, transparent 1px),\n    linear-gradient(90deg, rgba(255,255,255,.045) 1px, transparent 1px);\n  background-size: 54px 54px;\n  mask-image: radial-gradient(110% 75% at 50% 10%, #000 30%, transparent 78%);\n}\n/* a single sweeping scan line */\nhtml[data-hero=\"grid\"] .hero::after {\n  content: \"\"; position: absolute; left: 0; right: 0; top: 0; height: 200px; z-index: 0; pointer-events: none;\n  background: linear-gradient(180deg, rgba(54,216,230,.12), transparent);\n  animation: scan 7s linear infinite;\n}\n@keyframes scan { 0% { transform: translateY(-200px); } 100% { transform: translateY(620px); } }\n\n/* ============================================================\n   INTRO LOAD SEQUENCE\n   Built on the same robust .reveal → .in mechanism (class sets the\n   visible end-state), just a more dramatic, staggered entrance for\n   the hero. Never leaves content stuck hidden.\n   ============================================================ */\nhtml[data-intro=\"on\"] .hero .reveal,\nhtml[data-intro=\"on\"] .demo-card.reveal {\n  transform: translateY(34px) scale(.978);\n  filter: blur(7px);\n  transition: opacity .9s cubic-bezier(.2,.7,.2,1),\n              transform .9s cubic-bezier(.2,.7,.2,1),\n              filter .9s cubic-bezier(.2,.7,.2,1);\n}\nhtml[data-intro=\"on\"] .hero .reveal.in,\nhtml[data-intro=\"on\"] .demo-card.reveal.in {\n  transform: none; filter: blur(0);\n}\n/* richer stagger for the hero load */\nhtml[data-intro=\"on\"] .hero-tag.reveal   { transition-delay: .05s; }\nhtml[data-intro=\"on\"] .hero h1.reveal     { transition-delay: .18s; }\nhtml[data-intro=\"on\"] .hero .sub.reveal   { transition-delay: .34s; }\nhtml[data-intro=\"on\"] .hero-cta.reveal    { transition-delay: .48s; }\nhtml[data-intro=\"on\"] .demo-card.reveal   { transition-delay: .62s; }\n\n@media (prefers-reduced-motion: reduce) {\n  .hero-atmos i { animation: none !important; }\n  html[data-hero=\"grid\"] .hero::after { display: none; }\n  html[data-intro=\"on\"] .hero .reveal,\n  html[data-intro=\"on\"] .demo-card.reveal { transform: none; filter: none; transition: none; }\n}\n\n/* ============================================================\n   TWEAKS PANEL (vanilla, host-protocol aware)\n   ============================================================ */\n#twk {\n  position: fixed; right: 18px; bottom: 18px; z-index: 2147483646; width: 264px;\n  background: rgba(15,15,22,.82); color: var(--text, #F4F5F7);\n  -webkit-backdrop-filter: blur(22px) saturate(160%); backdrop-filter: blur(22px) saturate(160%);\n  border: 1px solid rgba(255,255,255,.12); border-radius: 16px;\n  box-shadow: 0 1px 0 rgba(255,255,255,.06) inset, 0 24px 60px -20px rgba(0,0,0,.8);\n  font-family: var(--font-sans, system-ui); overflow: hidden; display: none;\n}\n#twk.open { display: block; animation: twkIn .3s cubic-bezier(.2,.7,.2,1) both; }\n@keyframes twkIn { from { opacity: 0; transform: translateY(12px) scale(.97); } }\n.twk-hd { display: flex; align-items: center; justify-content: space-between; padding: 13px 12px 13px 16px; border-bottom: 1px solid rgba(255,255,255,.08); }\n.twk-hd b { font-size: 13px; font-weight: 600; letter-spacing: -0.01em; display: flex; align-items: center; gap: 8px; }\n.twk-hd b .d { width: 7px; height: 7px; border-radius: 50%; background: linear-gradient(110deg,#3B82F6,#36D8E6); }\n.twk-x { width: 24px; height: 24px; border-radius: 7px; color: rgba(255,255,255,.5); fo
